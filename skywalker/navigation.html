<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Skywalker - Path Navigation</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0d59f2",
                        "primary-dark": "#0a46c2",
                        "secondary": "#64748b",
                        "success": "#10b981",
                        "warning": "#f59e0b",
                        "danger": "#ef4444",

                        "background-dark": "#101622",

                        "display": ["Inter", "sans-serif"],
                        "sans": ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        "DEFAULT": "0.375rem",

                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #101622;
        }
        ::-webkit-scrollbar-thumb {
            background: #2d3748;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #4a5568;
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);

  </style>
<style>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-white font-display antialiased overflow-hidden h-screen flex flex-col selection:bg-primary selection:text-white">
<header class="flex items-center justify-between p-4 pb-2 z-10 bg-background-light dark:bg-background-dark">
<button id="nav-dashboard" class="flex size-10 items-center justify-center rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors text-slate-600 dark:text-white">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-lg font-bold leading-tight tracking-tight text-center flex-1 pr-10">Active Navigation</h2>
</header>
<main class="flex-1 flex flex-col relative overflow-y-auto w-full max-w-md mx-auto px-4 pb-24">
<div class="flex flex-col gap-4 mt-2 mb-6">
<div class="flex items-center justify-center">
<div class="flex items-center gap-2 px-4 py-2 rounded-full bg-success/20 border border-success/30 shadow-[0_0_15px_rgba(16,185,129,0.2)]">
<span class="material-symbols-outlined text-success fill-1 text-[20px]">check_circle</span>
<span class="text-success font-bold text-sm tracking-wide">ON COURSE</span>
</div>
</div>
<div class="text-center">
<h3 class="text-2xl font-bold dark:text-white flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-primary text-3xl">turn_right</span>
                    Turn right in 15m
                </h3>
</div>
</div>
<div class="relative w-full aspect-[4/3] rounded-2xl overflow-hidden shadow-lg border border-slate-200 dark:border-slate-700 group mb-6">
<div class="absolute inset-0 bg-cover bg-center" data-alt="Minneapolis Skyway map interface" data-location="Minneapolis" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuA_laCDPrth-k5mrsB_6jeodJX0E151NFlINM_0p4Nfg5uwkLs7IUbTUfF30hZJuu2wM8gE6WCfsHEK-Wf9WecH36E5yyHTff5dZAtYeB8V61YjwVz7e4sdD4OdtqO4s0AT5qfstEwDEKIatUU9nvQUy6E1A1n6pl60tKe_3QtgBLF0nihEvaYX7-F1pCz1O6fnMxYaBGVxwj3eOu0G2VQxmdmvr_afY2CaV6TDRtwD0c1cMwpsyJDu5H-Fe-CeCWxiCHo1Xg9utOU"); filter: grayscale(100%) invert(85%) contrast(120%); opacity: 0.8;'></div>
<div class="absolute inset-0 bg-slate-900/30 mix-blend-multiply"></div>
<svg class="absolute inset-0 w-full h-full pointer-events-none" style="filter: drop-shadow(0px 0px 4px rgba(13, 89, 242, 0.5));">
<path d="M 50 300 Q 150 250 180 150 T 350 50" fill="none" stroke="#0d59f2" stroke-linecap="round" stroke-width="4"></path>
<circle class="animate-pulse" cx="110" cy="220" fill="#0d59f2" r="8"></circle>
<circle class="animate-ping" cx="110" cy="220" fill="#0d59f2" fill-opacity="0.3" r="14"></circle>
<path d="M 110 220 L 104 232 L 110 228 L 116 232 Z" fill="white" transform="rotate(45, 110, 220)"></path>
</svg>
<div class="absolute bottom-3 right-3 flex flex-col gap-2">
<button class="size-8 bg-card-dark/90 backdrop-blur text-white rounded-lg flex items-center justify-center hover:bg-primary transition-colors">
<span class="material-symbols-outlined text-sm">my_location</span>
</button>
</div>
</div>
<div class="grid grid-cols-2 gap-4 mb-4">
<div class="bg-white dark:bg-card-dark rounded-xl p-5 border border-slate-200 dark:border-slate-700/50 shadow-sm flex flex-col justify-between">
<div class="flex items-center gap-2 mb-2 text-slate-500 dark:text-slate-400">
<span class="material-symbols-outlined text-xl">straight</span>
<span class="text-xs font-semibold uppercase tracking-wider">Dist. to Path</span>
</div>
<div class="flex items-baseline gap-1">
<span class="text-3xl font-bold dark:text-white tabular-nums">1.2</span>
<span class="text-sm font-medium text-slate-500 dark:text-slate-400">m</span>
</div>
</div>
<div class="bg-white dark:bg-card-dark rounded-xl p-5 border border-slate-200 dark:border-slate-700/50 shadow-sm flex flex-col justify-between">
<div class="flex items-center gap-2 mb-2 text-slate-500 dark:text-slate-400">
<span class="material-symbols-outlined text-xl">flag</span>
<span class="text-xs font-semibold uppercase tracking-wider">Progress</span>
</div>
<div class="flex items-center justify-between">
<span class="text-3xl font-bold dark:text-white tabular-nums">45%</span>
<div class="relative size-8">
<svg class="size-full -rotate-90" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
<circle class="stroke-slate-200 dark:stroke-slate-700" cx="18" cy="18" fill="none" r="16" stroke-width="4"></circle>
<circle class="stroke-primary" cx="18" cy="18" fill="none" r="16" stroke-dasharray="100" stroke-dashoffset="55" stroke-linecap="round" stroke-width="4"></circle>
</svg>
</div>
</div>
</div>
</div>
<div class="glass-panel rounded-xl p-4 mb-20">
<div class="flex items-center justify-between mb-3">
<h4 class="text-xs font-semibold text-slate-400 uppercase tracking-wider flex items-center gap-1">
<span class="material-symbols-outlined text-sm">wifi_tethering</span>
                    Sensor Confidence
                </h4>
<span class="text-xs font-bold text-success bg-success/10 px-2 py-0.5 rounded">High</span>
</div>
<div class="flex items-end gap-4">
<div class="flex-1">
<div class="flex justify-between items-end mb-1">
<span class="text-2xl font-bold dark:text-white tabular-nums">92%</span>
<span class="text-xs text-slate-400 mb-1">Signal Quality</span>
</div>
<div class="flex gap-0.5 h-1.5 w-full">
<div class="flex-1 bg-success rounded-full"></div>
<div class="flex-1 bg-success rounded-full"></div>
<div class="flex-1 bg-success rounded-full"></div>
<div class="flex-1 bg-success rounded-full"></div>
<div class="flex-1 bg-slate-700 rounded-full"></div>
</div>
</div>
<div class="h-8 w-px bg-slate-700 mx-2"></div>
<div class="flex flex-col items-center min-w-[60px]">
<span class="text-2xl font-bold dark:text-white tabular-nums">4</span>
<span class="text-[10px] text-slate-400 uppercase">APs Found</span>
</div>
</div>
<div class="mt-4 h-8 w-full flex items-end justify-between gap-1 opacity-50">
<div class="w-1 bg-primary/40 h-[40%] rounded-sm"></div>
<div class="w-1 bg-primary/60 h-[60%] rounded-sm"></div>
<div class="w-1 bg-primary/50 h-[30%] rounded-sm"></div>
<div class="w-1 bg-primary/80 h-[80%] rounded-sm"></div>
<div class="w-1 bg-primary/70 h-[50%] rounded-sm"></div>
<div class="w-1 bg-primary h-[90%] rounded-sm"></div>
<div class="w-1 bg-primary/90 h-[75%] rounded-sm"></div>
<div class="w-1 bg-primary/60 h-[45%] rounded-sm"></div>
<div class="w-1 bg-primary/40 h-[35%] rounded-sm"></div>
<div class="w-1 bg-primary/30 h-[20%] rounded-sm"></div>
<div class="w-1 bg-primary/50 h-[55%] rounded-sm"></div>
<div class="w-1 bg-primary/80 h-[85%] rounded-sm"></div>
<div class="w-1 bg-primary h-full rounded-sm"></div>
<div class="w-1 bg-primary/90 h-[95%] rounded-sm"></div>
<div class="w-1 bg-primary/70 h-[65%] rounded-sm"></div>
</div>
</div>
</main>
<div class="fixed bottom-0 left-0 w-full bg-background-light dark:bg-background-dark/95 backdrop-blur-md border-t border-slate-200 dark:border-slate-800 p-4 pb-8 z-20">
<div class="flex gap-3 max-w-md mx-auto">
<button class="flex-1 h-14 bg-danger hover:bg-red-600 active:bg-red-700 text-white font-semibold rounded-xl flex items-center justify-center gap-2 transition-all shadow-lg shadow-danger/20">
<span class="material-symbols-outlined fill-1">stop_circle</span>
                Stop
            </button>
<button class="flex-[2] h-14 bg-primary hover:bg-primary-dark active:bg-blue-700 text-white font-bold rounded-xl flex items-center justify-center gap-2 transition-all shadow-lg shadow-primary/20">
<span class="material-symbols-outlined fill-1">play_arrow</span>
                Resume Navigation
            </button>
</div>
</div>
<div class="fixed top-20 right-0 z-50">
<div class="group flex items-center translate-x-[calc(100%-8px)] hover:translate-x-0 transition-transform duration-300">
<div class="w-2 h-12 bg-slate-700 rounded-l-md cursor-pointer flex items-center justify-center">
<span class="material-symbols-outlined text-[10px] text-slate-400">chevron_left</span>
</div>
<div class="bg-slate-800 p-3 rounded-bl-lg shadow-xl border-l border-b border-slate-700">
<p class="text-[10px] text-slate-400 uppercase font-bold mb-2">Simulator</p>
<div class="flex gap-2">
<button class="p-1.5 bg-slate-700 rounded hover:bg-slate-600 text-white" title="Simulate Off Course">
<span class="material-symbols-outlined text-sm">u_turn_right</span>
</button>
<button class="p-1.5 bg-slate-700 rounded hover:bg-slate-600 text-white" title="Simulate Signal Loss">
<span class="material-symbols-outlined text-sm">signal_wifi_off</span>
</button>
</div>
</div>
</div>
</div>
<script src="js/app.js"></script>
</body></html>
